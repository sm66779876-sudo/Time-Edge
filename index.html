<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Edge - Rolex Watch</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #0a0a0a; color: #fff; text-align: center; }
        .header { background: #000; padding: 20px; border-bottom: 2px solid #b8860b; }
        .logo { max-width: 150px; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; background: #141414; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .main-img { width: 100%; border-radius: 10px; border: 1px solid #333; }
        .thumb-container { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .thumb { width: 70px; height: 70px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; object-fit: cover; }
        .thumb.active { border-color: #b8860b; }
        .title { color: #f5c518; font-size: 24px; margin: 20px 0; letter-spacing: 1px; }
        .price { color: #2ecc71; font-size: 22px; font-weight: bold; }
        .specs { text-align: left; list-style: none; padding: 0; margin: 20px 0; color: #ccc; }
        .specs li { padding: 8px 0; border-bottom: 1px solid #333; font-size: 14px; }
        .btn-wa { display: flex; align-items: center; justify-content: center; gap: 10px; background: #25d366; color: #fff; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 18px; margin-top: 20px; transition: 0.3s; }
        .btn-insta { display: flex; align-items: center; justify-content: center; gap: 10px; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: #fff; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 18px; margin-top: 12px; transition: 0.3s; }
        .btn-wa:hover, .btn-insta:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png.jpg" alt="Time Edge" class="logo">
    </div>
    <div class="container">
        <img id="mainImage" src="watch1.png.jpg" class="main-img">
        <div class="thumb-container">
            <img src="watch1.png.jpg" class="thumb active" onclick="change(this)">
            <img src="watch2.png.jpg" class="thumb" onclick="change(this)">
            <img src="watch3.png.jpg" class="thumb" onclick="change(this)">
        </div>
        <h2 class="title">Men’s Gold Silver Rolex Watch 40mm</h2>
        <p class="price">Rs. 3,600 (Free Delivery)</p>
        <ul class="specs">
            <li><strong>Material:</strong> Stainless Steel</li>
            <li><strong>Strap:</strong> Chain Strap</li>
            <li><strong>Dial:</strong> 40mm Round</li>
            <li><strong>Style:</strong> Comfortable Daily Wear</li>
        </ul>
        
        <a href="https://wa.me/923471817670?text=I%20want%20to%20order%20the%20Rolex%20Watch" class="btn-wa">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="25" alt="WA">
            Order on WhatsApp
        </a>

        <a href="https://www.instagram.com/time_edge01?igsh=MWg4dWRxOXc5NHd6eA%3D%3D" class="btn-insta">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" width="25" alt="Insta">
            Order on Instagram
        </a>
    </div>
    <script>
        function change(el) {
            document.getElementById('mainImage').src = el.src;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
